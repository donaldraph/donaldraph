name: Update YouTube Cards

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          # ┌──────────────────────────────────────────────────────┐
          # │  REPLACE THIS with your real channel ID              │
          # │                                                      │
          # │  HOW TO FIND IT:                                     │
          # │  1. Go to youtube.com/@donaldraph in your browser    │
          # │  2. Right-click → View Page Source                   │
          # │  3. Ctrl+F search for: youtube.com/channel/          │
          # │  4. Copy the UC... string that follows               │
          # │                                                      │
          # │  OR go to: youtube.com/account_advanced               │
          # │  (must be logged in) — your channel ID is listed     │
          # └──────────────────────────────────────────────────────┘
          channel_id: UCxxxxxxxxxxxxxxxxxxxxxxxxx
          max_videos: 3
          card_width: 320
          border_radius: 5
          background_color: "#0d1117"
          title_color: "#ffffff"
          stats_color: "#8b949e"
          theme_context_light: '{ "background_color": "#ffffff", "title_color": "#0d1117", "stats_color": "#586069" }'
          theme_context_dark: '{ "background_color": "#0d1117", "title_color": "#ffffff", "stats_color": "#8b949e" }'
          show_duration: true
          author_name: Donald
          commit_message: "docs: update README with latest YouTube videos"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
